<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Banking System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #f7f8fa;
            --surface3: #eef0f3;
            --border: #dde1e7;
            --border-strong: #c5cad4;
            --text: #0f1923;
            --text-sub: #4a5568;
            --text-muted: #8a94a6;
            --text-dim: #b8c0cc;
            --primary: #1a3c6e;
            --primary-hover: #163260;
            --primary-light: #e8eef7;
            --green: #0d7a4e;
            --green-bg: #e8f5ef;
            --red: #b91c1c;
            --red-bg: #fef2f2;
            --amber: #92400e;
            --amber-bg: #fffbeb;
            --blue: #1e40af;
            --blue-bg: #eff6ff;
            --bronze: #92400e;
            --bronze-bg: #fef3c7;
            --gold: #78350f;
            --gold-bg: #fef3c7;
            --biz: #1e3a5f;
            --biz-bg: #dbeafe;
            --radius: 6px;
            --radius-sm: 4px;
            --radius-lg: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ── */
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--primary);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 32px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .logo-mark svg {
                width: 18px;
                height: 18px;
                fill: #fff;
            }

        .logo-text {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }

            .logo-text span {
                color: rgba(255,255,255,.55);
                font-weight: 400;
                font-size: 13px;
                margin-left: 8px;
            }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .session-pill {
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: rgba(255,255,255,.85);
            display: none;
        }

            .session-pill.active {
                display: block;
            }

        .btn-logout {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.2);
            color: rgba(255,255,255,.85);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 500;
            transition: background .15s;
            display: none;
        }

            .btn-logout:hover {
                background: rgba(255,255,255,.2);
            }

        /* ── MAIN LAYOUT ── */
        main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 36px 16px 48px;
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 560px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .card-eyebrow {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 3px;
        }

        .card-body {
            padding: 28px;
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 0.1px;
        }

        input, select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 10px 13px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

            input:focus, select:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(26,60,110,.1);
            }

            input::placeholder {
                color: var(--text-dim);
            }

            select option {
                background: #fff;
            }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all .15s;
            letter-spacing: 0.1px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

            .btn-primary:hover {
                background: var(--primary-hover);
                border-color: var(--primary-hover);
            }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-sub);
            border-color: var(--border);
        }

            .btn-secondary:hover {
                background: var(--surface2);
                border-color: var(--border-strong);
                color: var(--text);
            }

        .btn-danger {
            background: var(--surface);
            color: var(--red);
            border-color: #fca5a5;
        }

            .btn-danger:hover {
                background: var(--red-bg);
            }

        .btn-success {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

            .btn-success:hover {
                opacity: .88;
            }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ── NAV MENU ── */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 16px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .12s;
            background: var(--surface);
        }

            .nav-item:hover {
                background: var(--primary-light);
                border-color: #c7d7ef;
            }

        .nav-icon {
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

            .nav-icon svg {
                width: 16px;
                height: 16px;
            }

        .nav-text .nav-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .nav-text .nav-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .nav-arrow {
            margin-left: auto;
            color: var(--text-dim);
            font-size: 18px;
            line-height: 1;
        }

        /* ── ALERTS ── */
        .alert {
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 18px;
            border: 1px solid;
            display: flex;
            align-items: flex-start;
            gap: 9px;
            line-height: 1.45;
        }

        .alert-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        .alert-error {
            background: var(--red-bg);
            border-color: #fca5a5;
            color: var(--red);
        }

            .alert-error .alert-dot {
                background: var(--red);
            }

        .alert-success {
            background: var(--green-bg);
            border-color: #6ee7b7;
            color: var(--green);
        }

            .alert-success .alert-dot {
                background: var(--green);
            }

        .alert-warning {
            background: var(--amber-bg);
            border-color: #fcd34d;
            color: var(--amber);
        }

            .alert-warning .alert-dot {
                background: #d97706;
            }

        .alert-info {
            background: var(--blue-bg);
            border-color: #93c5fd;
            color: var(--blue);
        }

            .alert-info .alert-dot {
                background: var(--blue);
            }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-bronze {
            background: var(--bronze-bg);
            color: var(--bronze);
        }

        .badge-gold {
            background: #fef9c3;
            color: #713f12;
        }

        .badge-business {
            background: var(--biz-bg);
            color: var(--biz);
        }

        .badge-frozen {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-suspicious {
            background: var(--red-bg);
            color: var(--red);
        }

        /* ── BALANCE CARD ── */
        .balance-block {
            background: var(--primary);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 22px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

            .balance-block .bal-label {
                font-size: 11px;
                font-weight: 500;
                color: rgba(255,255,255,.6);
                text-transform: uppercase;
                letter-spacing: 0.8px;
                margin-bottom: 6px;
            }

            .balance-block .bal-amount {
                font-family: 'JetBrains Mono', monospace;
                font-size: 26px;
                font-weight: 500;
                letter-spacing: -1px;
            }

            .balance-block .bal-currency {
                font-size: 13px;
                font-weight: 400;
                color: rgba(255,255,255,.6);
                margin-left: 4px;
            }

            .balance-block .bal-meta {
                font-size: 11px;
                color: rgba(255,255,255,.5);
                margin-top: 4px;
            }

        /* ── TIER INFO ── */
        .tier-table {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .tier-table-head {
            padding: 9px 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            background: var(--surface3);
        }

        .tier-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 14px;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }

            .tier-row:last-child {
                border-bottom: none;
            }

            .tier-row .t-limit {
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                color: var(--text-muted);
            }

        /* ── DATA TABLE ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

            .data-table th {
                text-align: left;
                padding: 9px 12px;
                border-bottom: 2px solid var(--border);
                color: var(--text-sub);
                font-weight: 600;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.4px;
                background: var(--surface2);
            }

            .data-table td {
                padding: 11px 12px;
                border-bottom: 1px solid var(--border);
                color: var(--text);
                vertical-align: middle;
            }

            .data-table tr:last-child td {
                border-bottom: none;
            }

            .data-table tbody tr:hover td {
                background: var(--surface2);
            }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── DIVIDER ── */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* ── SECTION LABEL ── */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 10px;
        }

        /* ── STEP HINT ── */
        .hint-box {
            background: var(--blue-bg);
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-sm);
            padding: 10px 13px;
            font-size: 12px;
            color: var(--blue);
            margin-bottom: 18px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
        }

            .empty-state .es-icon {
                width: 48px;
                height: 48px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 12px;
            }

                .empty-state .es-icon svg {
                    width: 22px;
                    height: 22px;
                    stroke: var(--text-muted);
                    fill: none;
                }

            .empty-state .es-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 4px;
            }

            .empty-state .es-text {
                font-size: 13px;
                color: var(--text-muted);
            }

        /* ── TX TYPE COLORS ── */
        .tx-credit {
            color: var(--green);
            font-weight: 600;
        }

        .tx-debit {
            color: var(--red);
            font-weight: 600;
        }

        /* ── PIN MODAL ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

            .overlay.open {
                display: flex;
            }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 18px 22px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 2px 6px;
            line-height: 1;
            border-radius: var(--radius-sm);
        }

            .modal-close:hover {
                background: var(--surface2);
                color: var(--text);
            }

        .modal-body {
            padding: 22px;
        }

        /* PIN PAD */
        .pin-dots {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 14px 0 8px;
        }

        .pin-dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--surface3);
            border: 2px solid var(--border-strong);
            transition: all .15s;
        }

            .pin-dot.filled {
                background: var(--primary);
                border-color: var(--primary);
            }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 230px;
            margin: 12px auto 0;
        }

        .pin-key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 0;
            font-size: 17px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: all .1s;
        }

            .pin-key:hover {
                background: var(--primary-light);
                border-color: #c7d7ef;
            }

            .pin-key:active {
                transform: scale(.96);
            }

            .pin-key.key-del {
                font-size: 13px;
                color: var(--text-sub);
                font-family: inherit;
            }

            .pin-key.key-empty {
                visibility: hidden;
            }

        .attempts-text {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--surface);
        }
    </style>
</head>
<body>
    <div id="app">

        <header>
            <div class="logo-mark">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="#fff" stroke-width="1.5" /></svg>
            </div>
            <div class="logo-text">National Banking System <span>Management Portal</span></div>
            <div class="header-right">
                <div class="session-pill" id="sessionBadge"></div>
                <button class="btn-logout" id="logoutBtn" onclick="logout()">Sign Out</button>
            </div>
        </header>

        <main>
            <div class="card" id="mainCard">
                <div class="card-header" id="cardHeader">
                    <div class="card-eyebrow" id="cardEyebrow">Welcome</div>
                    <div class="card-title" id="cardTitle">Banking Management System</div>
                    <div class="card-subtitle" id="cardSubtitle">Select your account type to continue</div>
                </div>
                <div class="card-body" id="cardBody"></div>
            </div>
        </main>

        <footer>
            <span>National Banking System &mdash; OOP Assignment 3</span>
            <span>All data stored locally in your browser</span>
        </footer>
    </div>

    <!-- PIN Overlay -->
    <div class="overlay" id="pinOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Card PIN Verification</div>
                <button class="modal-close" onclick="closePinModal()">&times;</button>
            </div>
            <div class="modal-body" id="pinModalBody"></div>
        </div>
    </div>

    <!-- Confirm Overlay -->
    <div class="overlay" id="confirmOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="confirmTitle">Confirm</div>
                <button class="modal-close" onclick="closeConfirm()">&times;</button>
            </div>
            <div class="modal-body" id="confirmBody"></div>
        </div>
    </div>

    <script>

        // icon helper

        const IC = {
        user:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
        building: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 21V9h6v12M9 13h6"/></svg>`,
        shield:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l7 4v5c0 5-3.5 9.5-7 11-3.5-1.5-7-6-7-11V6l7-4z"/></svg>`,
        plus:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>`,
        login:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>`,
        deposit:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`,
        withdraw: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`,
        transfer: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`,

        // small utility functions

        function getCurrentDate() {
        const d = new Date();
        return `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`;
        }
        function genId() {
        let id;
        do { id = String(Math.floor(Math.random()*900)+100); } while (!isIdUnique(id));
        return id;
        }
        function genCard() { return Array.from({length:16},()=>Math.floor(Math.random()*10)).join(''); }
        function isIdUnique(id) {
        return ![...DB.get('users'),...DB.get('pending_users'),...DB.get('companies'),...DB.get('pending_companies')].find(r=>r.id===id);
        }
        function isUsernameTaken(u) {
        return !![...DB.get('users'),...DB.get('pending_users'),...DB.get('companies'),...DB.get('pending_companies')].find(r=>r.username===u.trim());
        }
        function isAccountFrozen(id) { return !!DB.get('freeze_acc').find(r=>r.id===id); }
        function isCardFrozen(cn) { return !!DB.get('freeze_cards').find(r=>r.cardNumber===cn); }
        function isAccountSuspicious(id) { return !!DB.get('suspicious').find(r=>r.id===id); }
        function getBalanceLimit(cat) { return cat==='Business'?100000000000:cat==='Gold'?1000000000:100000000; }
        function getDailyLimit(cat) { return cat==='Business'?20000000:cat==='Gold'?500000:100000; }
        function logTx(id, amount, type, targetId='') {
        const txs = DB.get('transactions');
        txs.push({date:getCurrentDate(),id,amount,type,targetId});
        DB.set('transactions',txs);
        }
        function modifyBalance(key, targetId, amount, isDeposit) {
        const recs = DB.get(key);
        const idx = recs.findIndex(r=>r.id===targetId);
        if (idx===-1) return {ok:false,msg:'Account not found.'};
        const rec = recs[idx];
        const limit = getBalanceLimit(rec.category);
        if (isDeposit) {
        const cap = limit - rec.balance;
        if (amount > cap) return {ok:false,msg:`Deposit declined. Remaining capacity: ${fmt(cap)} PKR.`};
        rec.balance += amount;
        } else {
        if (rec.balance < amount) return {ok:false,msg:`Insufficient funds. Available balance: ${fmt(rec.balance)} PKR.`};
        rec.balance -= amount;
        }
        DB.set(key, recs);
        return {ok:true};
        }
        function fmt(n) { return Number(n).toLocaleString('en-PK'); }
        function handleFraud(userId, cardNumber) {
        const fc = DB.get('freeze_cards');
        if (!fc.find(r=>r.cardNumber===cardNumber)) { fc.push({cardNumber,userId}); DB.set('freeze_cards',fc); }
        if (!isAccountSuspicious(userId)) {
        const susp = DB.get('suspicious');
        const acc = [...DB.get('users'),...DB.get('companies')].find(r=>r.id===userId);
        susp.push({id:userId,name:acc?acc.name:'Unknown',cnic:acc?(acc.cnic||acc.taxNumber||''):'',reason:'Fraud — 3 incorrect PIN attempts'});
        DB.set('suspicious',susp);
        }
        }

        function createCard() {
        const pin=document.getElementById('new_pin').value.trim(), msgEl=document.getElementById('newCardMsg');
        if (!/^\d{4}$/.test(pin)) { msgEl.innerHTML=al('error','PIN must be exactly 4 digits.'); return; }

        const cards=DB.get('cards');
        cards.push({userId:session.id,cardNumber,pin});
        DB.set('cards',cards);
        msgEl.innerHTML=al('success',`Card issued. Number: <span class="mono">${cardNumber.match(/.{4}/g).join(' ')}</span>. You may now withdraw.`);
        setTimeout(()=>renderWithdraw(),2500);
        }
        function initiateWithdraw() {
        const cards=DB.get('cards').filter(c=>c.userId===session.id&&!isCardFrozen(c.cardNumber));
        const cardIdx=parseInt(document.getElementById('wd_card').value);
        const amt=parseFloat(document.getElementById('wd_amt').value);
        const msgEl=document.getElementById('wdMsg');
        if (!amt||amt<=0) { msgEl.innerHTML=al('error','Please enter a valid amount.'); return; }
        const fk=session.role==='Company'?'companies':'users';
        const acc=DB.get(fk).find(r=>r.id===session.id);
        if (amt>getDailyLimit(acc.category)) { msgEl.innerHTML=al('error',`Amount exceeds daily limit of ${fmt(getDailyLimit(acc.category))} PKR.`); return; }
        openPinModal(cards[cardIdx],amt);
        }

        // pin confirmation popup
        let _pinAttempts=0, _pinCard=null, _pinAmt=0, _pinInput='';

        function openPinModal(card,amt) {
        _pinCard=card; _pinAmt=amt; _pinAttempts=0; _pinInput='';
        document.getElementById('pinOverlay').classList.add('open');
        renderPinModal();
        }
        function closePinModal() {
        document.getElementById('pinOverlay').classList.remove('open');
        _pinCard=null; _pinAmt=0; _pinAttempts=0; _pinInput='';
        }
        function renderPinModal() {
        const remaining=3-_pinAttempts;
        document.getElementById('pinModalBody').innerHTML=`
        <div style="text-align:center;margin-bottom:4px;color:var(--text-sub);font-size:13px;">
        Card ending <span class="mono">****${_pinCard.cardNumber.slice(-4)}</span>
        </div>
        <div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--text-muted);">
        Amount: <strong style="color:var(--text);font-family:'JetBrains Mono',monospace">${fmt(_pinAmt)} PKR</strong>
        </div>
        <div class="pin-dots" id="pinDots">
        ${[0,1,2,3].map(i=>`<div class="pin-dot ${i<_pinInput.length?'filled':''}" id="dot${i}"></div>`).join('')}
        </div>
        <div class="attempts-text">${remaining} attempt${remaining===1?'':'s'} remaining</div>
        <div class="pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(k=>`<button class="pin-key" onclick="pinKey('${k}')">${k}</button>`).join('')}
        <button class="pin-key key-empty"></button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key key-del" onclick="pinKey('DEL')">Del</button>
        </div>
        <div id="pinMsg" style="margin-top:14px;"></div>
        `;
        }
        function pinKey(k) {
        if (k==='DEL') { _pinInput=_pinInput.slice(0,-1); }
        else if (_pinInput.length<4) { _pinInput+=k; }
        [0,1,2,3].forEach(i=>{ const el=document.getElementById(`dot${i}`); if(el) el.classList.toggle('filled',i<_pinInput.length); });
        if (_pinInput.length===4) {
        setTimeout(()=>{
        if (_pinInput===_pinCard.pin) {
        const amt=_pinAmt, card=_pinCard;
        closePinModal();
        doWithdraw(amt,card);
        } else {
        _pinAttempts++;
        _pinInput='';
        if (_pinAttempts>=3) {
        const fraudCard=_pinCard;
        closePinModal();
        handleFraud(session.id,fraudCard.cardNumber);
        setCard({eyebrow:'Security Alert', title:'Access Denied', subtitle:'Fraudulent activity detected'});
        setBody(`${al('error','Three consecutive incorrect PIN attempts have been recorded. Your card has been suspended and account flagged for review.')}
        <button class="btn btn-secondary" onclick="backToDashboard()">Return to Dashboard</button>`);
        } else {
        document.getElementById('pinMsg').innerHTML=al('error',`Incorrect PIN. ${3-_pinAttempts} attempt${3-_pinAttempts===1?'':'s'} remaining.`);
        renderPinModal();
        }
        }
        },100);
        }
        }
        function doWithdraw(amt,card) {
        const fk=session.role==='Company'?'companies':'users';
        const res=modifyBalance(fk,session.id,amt,false);
        if (res.ok) {
        logTx(session.id,amt,'Withdraw');
        backToDashboard(`Withdrawal of ${fmt(amt)} PKR completed successfully.`);
        } else {
        backToDashboard();
        document.getElementById('cardBody').insertAdjacentHTML('afterbegin',al('error',res.msg));
        }
        }

        function toggleTransferFields() {
        const v=document.getElementById('tr_type').value;

        function submitTransfer() {
        const type=document.getElementById('tr_type').value, amt=parseFloat(document.getElementById('tr_amt').value), msgEl=document.getElementById('trMsg');
        if (!amt||amt<=0) { msgEl.innerHTML=al('error','Please enter a valid amount.'); return; }
        let targetId=null;
        if (type==='user') {
        const name=document.getElementById('tr_name').value.trim(), cnic=document.getElementById('tr_cnic').value.trim();
        const rec=DB.get('users').find(r=>r.name.toLowerCase()===name.toLowerCase()&&r.cnic===cnic);
        if (rec) targetId=rec.id;
        } else {
        const cname=document.getElementById('tr_cname').value.trim(), tax=document.getElementById('tr_tax').value.trim();
        const rec=DB.get('companies').find(r=>r.name.toLowerCase()===cname.toLowerCase()&&r.taxNumber===tax);
        if (rec) targetId=rec.id;
        }
        if (!targetId) { msgEl.innerHTML=al('error','Recipient not found. Please verify the name and identification details.'); return; }
        if (targetId===session.id) { msgEl.innerHTML=al('error','You cannot transfer funds to your own account.'); return; }
        const srcKey=session.role==='Company'?'companies':'users';
        const res=modifyBalance(srcKey,session.id,amt,false);
        if (!res.ok) { msgEl.innerHTML=al('error',res.msg); return; }
        modifyBalance(type==='company'?'companies':'users',targetId,amt,true);
        logTx(session.id,amt,'Transfer',targetId);
        backToDashboard(`Transfer of ${fmt(amt)} PKR to account #${targetId} completed.`);
        }

        const pending=DB.get(pk), rec=pending[idx];
        openConfirm(`Approve — ${rec.name}`,
        `<p style="font-size:13px;color:var(--text-sub);margin-bottom:14px">Assign a card to this account by setting a 4-digit PIN.</p>
        <div class="form-group"><label>Card PIN (4 digits)</label><input type="password" id="approve_pin" maxlength="4" placeholder="e.g. 1234"></div>
        <div id="approvePinMsg"></div>`,
        ()=>{
        const pin=document.getElementById('approve_pin').value.trim();
        if (!/^\d{4}$/.test(pin)) { document.getElementById('approvePinMsg').innerHTML=al('error','PIN must be 4 digits.'); return false; }
        const dest=DB.get(type==='user'?'users':'companies'); dest.push(rec); DB.set(type==='user'?'users':'companies',dest);
        const newCard=genCard(), cards=DB.get('cards');
        cards.push({userId:rec.id,cardNumber:newCard,pin}); DB.set('cards',cards);
        const np=pending.filter((_,i)=>i!==idx); DB.set(pk,np);
        renderAdminPanel(`${rec.name} approved. Card assigned ending ****${newCard.slice(-4)}.`);
        return true;
        });
        }
        function rejectRequest(type,idx) {
        const pk=type==='user'?'pending_users':'pending_companies';
        const p=DB.get(pk); p.splice(idx,1); DB.set(pk,p);
        renderAdminRequests();
        }

        // admin loan review
        function renderAdminLoans() {
        const loans=DB.get('loans');
        setCard({eyebrow:'Admin', title:'Loan Requests', subtitle:`${loans.length} pending`});
        if (!loans.length) {
        setBody(`<div class="empty-state"><div class="es-icon">${IC.loan}</div><div class="es-title">No loan requests</div><div class="es-text">There are no pending loan applications at this time.</div></div><button class="btn btn-secondary" onclick="renderAdminPanel()">Back</button>`); return;
        }
        const rows=loans.map((l,i)=>`<tr>
        <td class="mono">${l.companyId}</td><td>${l.companyName}</td>
        <td class="mono" style="text-align:right">${fmt(l.amount)}</td>
        <td><div class="btn-row"><button class="btn btn-success btn-sm" onclick="approveLoan(${i})">Approve</button><button class="btn btn-danger btn-sm" onclick="rejectLoan(${i})">Reject</button></div></td>
        </tr>`).join('');
        setBody(`
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>Co. ID</th><th>Company</th><th style="text-align:right">Amount (PKR)</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back to Admin Panel</button>
        `);
        }
        function approveLoan(idx) {
        const loans=DB.get('loans'), l=loans[idx];
        modifyBalance('companies',l.companyId,l.amount,true);
        logTx(l.companyId,l.amount,'Loan Deposit');
        loans.splice(idx,1); DB.set('loans',loans);
        renderAdminPanel(`Loan of ${fmt(l.amount)} PKR approved for ${l.companyName}.`);
        }
        function rejectLoan(idx) {
        const loans=DB.get('loans'); loans.splice(idx,1); DB.set('loans',loans);
        renderAdminLoans();
        }

        // admin transaction history
        function renderAdminTransactionHistory() {
        const users=DB.get('users'), companies=DB.get('companies');
        const all=[...users.map(u=>({...u,type:'User'})),...companies.map(c=>({...c,type:'Company'}))];
        setCard({eyebrow:'Admin', title:'Transaction History', subtitle:'Select an account to view its statement'});
        const rows=all.map(a=>`<tr style="cursor:pointer" onclick="renderAdminTxDetail('${a.id}','${a.name}')">
        <td class="mono">${a.id}</td><td>${a.name}</td>
        <td><span style="font-size:11px;color:var(--text-muted)">${a.type}</span></td>
        <td>${badgeCat(a.category)}</td>
        </tr>`).join('');
        setBody(`
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Tier</th></tr></thead><tbody>${rows}</tbody></table></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back to Admin Panel</button>
        `);
        }
        function renderAdminTxDetail(uid,name) {
        const txs=DB.get('transactions').filter(t=>t.id===uid||t.targetId===uid);
        setCard({eyebrow:'Transaction History', title:name, subtitle:`Account No. ${uid}`});
        if (!txs.length) {
        setBody(`<div class="empty-state"><div class="es-icon">${IC.history}</div><div class="es-title">No transactions</div><div class="es-text">This account has no recorded transactions.</div></div>
        <button class="btn btn-secondary" onclick="renderAdminTransactionHistory()">Back</button>`); return;
        }
        const rows=txs.slice().reverse().map(t=>{
        const isOut=t.id===uid;
        const label=!isOut?`Received (from #${t.id})`:t.targetId?`${t.type} to #${t.targetId}`:t.type;
        const isCr=t.type==='Deposit'||t.type==='Loan Deposit'||!isOut;
        return `<tr>
        <td class="mono" style="font-size:12px;color:var(--text-muted)">${t.date}</td>
        <td style="font-size:13px;color:var(--text-sub)">${label}</td>
        <td class="mono ${isCr?'tx-credit':'tx-debit'}" style="text-align:right;font-size:13px">${isCr?'+':'−'}${fmt(t.amount)}</td>
        </tr>`;
        }).join('');
        setBody(`
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Date</th><th>Description</th><th style="text-align:right">Amount (PKR)</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div class="divider"></div>
        <button class="btn btn-secondary" onclick="renderAdminTransactionHistory()">Back</button>
        `);
        }

        // freeze account/card
        function renderAdminFreeze() {
        const susp=DB.get('suspicious');
        setCard({eyebrow:'Admin', title:'Freeze Account', subtitle:'Accounts flagged as suspicious'});
        if (!susp.length) {
        setBody(`<div class="empty-state"><div class="es-icon">${IC.check}</div><div class="es-title">No suspicious accounts</div><div class="es-text">There are no accounts flagged for review at this time.</div></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back</button>`); return;
        }
        const rows=susp.map((s,i)=>`<tr>
        <td class="mono">${s.id}</td><td>${s.name}</td>
        <td class="mono" style="font-size:11px">${s.cnic}</td>
        <td style="font-size:12px;color:var(--amber)">${s.reason}</td>
        <td><button class="btn btn-danger btn-sm" onclick="freezeAccount(${i})">Freeze</button></td>
        </tr>`).join('');
        setBody(`
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>CNIC / Tax</th><th>Reason</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back to Admin Panel</button>
        `);
        }
        function freezeAccount(idx) {
        const susp=DB.get('suspicious'), s=susp[idx];
        const fa=DB.get('freeze_acc');
        if (!fa.find(r=>r.id===s.id)) { fa.push({id:s.id,name:s.name,cnic:s.cnic,reason:'Frozen by Admin'}); DB.set('freeze_acc',fa); }
        const cards=DB.get('cards').filter(c=>c.userId===s.id);
        const fc=DB.get('freeze_cards');
        cards.forEach(c=>{ if(!fc.find(r=>r.cardNumber===c.cardNumber)) fc.push({cardNumber:c.cardNumber,userId:s.id}); });
        DB.set('freeze_cards',fc);
        const ns=susp.filter((_,i)=>i!==idx); DB.set('suspicious',ns);
        renderAdminPanel(`Account #${s.id} (${s.name}) has been frozen along with all associated cards.`);
        }

        // unfreeze account/card
        function renderAdminUnfreeze() {
        const fa=DB.get('freeze_acc'), fc=DB.get('freeze_cards');
        setCard({eyebrow:'Admin', title:'Unfreeze', subtitle:'Restore frozen accounts or cards'});
        const aRows=fa.length?fa.map((f,i)=>`<tr>
        <td class="mono">${f.id}</td><td>${f.name}</td>
        <td class="mono" style="font-size:11px">${f.cnic}</td>
        <td style="font-size:12px;color:var(--text-muted)">${f.reason}</td>
        <td><button class="btn btn-success btn-sm" onclick="unfreezeAccount(${i})">Unfreeze</button></td>
        </tr>`).join(''):`<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px">No frozen accounts</td></tr>`;
        const cRows=fc.length?fc.map((c,i)=>`<tr>
        <td class="mono">****${c.cardNumber.slice(-4)}</td><td class="mono">${c.userId}</td>
        <td><button class="btn btn-success btn-sm" onclick="unfreezeCard(${i})">Unfreeze</button></td>
        </tr>`).join(''):`<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:16px">No frozen cards</td></tr>`;
        setBody(`
        <div class="section-label">Frozen Accounts</div>
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>CNIC / Tax</th><th>Reason</th><th>Action</th></tr></thead><tbody>${aRows}</tbody></table></div>
        <div class="section-label">Frozen Cards</div>
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>Card</th><th>Account ID</th><th>Action</th></tr></thead><tbody>${cRows}</tbody></table></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back to Admin Panel</button>
        `);
        }
        function unfreezeAccount(idx) {
        const fa=DB.get('freeze_acc'), uid=fa[idx].id, name=fa[idx].name;
        fa.splice(idx,1); DB.set('freeze_acc',fa);
        DB.set('freeze_cards',DB.get('freeze_cards').filter(r=>r.userId!==uid));
        renderAdminPanel(`Account #${uid} (${name}) and associated cards have been unfrozen.`);
        }
        function unfreezeCard(idx) {
        const fc=DB.get('freeze_cards'), card=fc[idx];
        if (isAccountFrozen(card.userId)) {
        renderAdminUnfreeze();
        document.getElementById('cardBody').insertAdjacentHTML('afterbegin',al('error',`Cannot unfreeze card — account #${card.userId} is still frozen. Unfreeze the account first.`));
        return;
        }
        fc.splice(idx,1); DB.set('freeze_cards',fc);
        renderAdminPanel(`Card ****${card.cardNumber.slice(-4)} has been unfrozen.`);
        }

        // remove account
        function renderAdminRemove() {
        const susp=DB.get('suspicious'), frozen=DB.get('freeze_acc'), fc=DB.get('freeze_cards');
        setCard({eyebrow:'Admin', title:'Remove Account / Card', subtitle:'Permanently remove suspicious or frozen records'});
        const combined=[...susp.map(s=>({...s,status:'Suspicious'})),...frozen.map(f=>({...f,status:'Frozen'}))];
        const aRows=combined.length?combined.map(a=>`<tr>
        <td class="mono">${a.id}</td><td>${a.name}</td>
        <td><span class="badge badge-${a.status.toLowerCase()}">${a.status}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="removeAccount('${a.id}','${a.name}')">Remove</button></td>
        </tr>`).join(''):`<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:16px">No accounts available for removal</td></tr>`;
        const cRows=fc.length?fc.map(c=>`<tr>
        <td class="mono">****${c.cardNumber.slice(-4)}</td><td class="mono">${c.userId}</td>
        <td><button class="btn btn-danger btn-sm" onclick="removeCard('${c.cardNumber}')">Remove</button></td>
        </tr>`).join(''):`<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:16px">No frozen cards</td></tr>`;
        setBody(`
        <div class="section-label">Accounts</div>
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Status</th><th>Action</th></tr></thead><tbody>${aRows}</tbody></table></div>
        <div class="section-label">Frozen Cards</div>
        <div style="overflow-x:auto;margin-bottom:22px"><table class="data-table"><thead><tr><th>Card</th><th>Account ID</th><th>Action</th></tr></thead><tbody>${cRows}</tbody></table></div>
        <button class="btn btn-secondary" onclick="renderAdminPanel()">Back to Admin Panel</button>
        `);
        }
        function removeAccount(uid,name) {
        ['users','companies','freeze_acc','suspicious'].forEach(k=>DB.set(k,DB.get(k).filter(r=>r.id!==uid)));
        DB.set('cards',DB.get('cards').filter(c=>c.userId!==uid));
        DB.set('freeze_cards',DB.get('freeze_cards').filter(r=>r.userId!==uid));
        renderAdminPanel(`Account #${uid} (${name}) and all associated records have been permanently removed.`);
        }
        function removeCard(cardNumber) {
        DB.set('cards',DB.get('cards').filter(c=>c.cardNumber!==cardNumber));
        DB.set('freeze_cards',DB.get('freeze_cards').filter(r=>r.cardNumber!==cardNumber));
        renderAdminPanel(`Card ****${cardNumber.slice(-4)} has been permanently removed.`);
        }

        // confirm popup

        let _confirmCb=null;
        function openConfirm(title,bodyHtml,onConfirm) {
        document.getElementById('confirmTitle').textContent=title;
        document.getElementById('confirmBody').innerHTML=`${bodyHtml}<div class="divider"></div><div class="btn-row"><button class="btn btn-primary" onclick="confirmAction()">Confirm</button><button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button></div>`;
        _confirmCb=onConfirm;
        document.getElementById('confirmOverlay').classList.add('open');
        }
        function confirmAction() { if(_confirmCb&&_confirmCb()!==false) closeConfirm(); }
        function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); _confirmCb=null; }


        // kick things off

        DB.init();
        renderMain();
    </script>
</body>
</html>
